spring:
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
        username: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:changeme
        driver-class-name: org.postgresql.Driver
        hikari:
            maximum-pool-size: 30
            minimum-idle: 10
            idle-timeout: 300000

    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}
            password: ${REDIS_PASSWORD:}

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false

    flyway:
        enabled: true
        locations: classpath:db/migration

jwt:
    secret: ${JWT_SECRET}

logging:
    file:
        name: /var/log/wildledger/wildledger.log
    level:
        root: WARN
        com.gen-4.wildledger: INFO
        org.springframework.security: WARN
    logback:
        rollingpolicy:
            max-file-size: 10MB
            max-history: 30
            total-size-cap: 1GB
